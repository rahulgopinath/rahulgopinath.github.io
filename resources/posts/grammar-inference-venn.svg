<svg xmlns="http://www.w3.org/2000/svg" width="520" height="280">
  <!-- Universe -->
  <rect x="10" y="10" width="500" height="260" fill="#f9f9f9" stroke="#555" stroke-width="1.5" rx="4"/>

  <!-- L(Gb) ellipse -->
  <ellipse cx="195" cy="140" rx="150" ry="105" fill="#cce0ff" fill-opacity="0.55" stroke="#3366cc" stroke-width="1.5"/>

  <!-- L(Gl) ellipse -->
  <ellipse cx="325" cy="140" rx="150" ry="105" fill="#ffd9cc" fill-opacity="0.55" stroke="#cc4422" stroke-width="1.5"/>

  <!-- Region labels -->
  <text x="105" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#222">FN</text>
  <text x="260" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#222">TP</text>
  <text x="415" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#222">FP</text>
  <text x="474" y="38"  text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#555">TN</text>

  <!-- Grammar labels inside ellipses near top -->
  <text x="175" y="58" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#3366cc">L(Gb)</text>
  <text x="345" y="58" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#cc4422">L(Gl)</text>
</svg>
